<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart | Products</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div id="app-header"></div>
    <main class="section">
      <div class="container">
        <h1 class="section-title">All Products</h1>
        <p class="section-subtitle">Search, filter, and sort products to find exactly what you need.</p>
        <div class="filters">
          <input id="search-input" class="input" type="text" placeholder="Search products by name">
          <select id="category-select" class="select">
            <option value="">All Categories</option>
          </select>
          <select id="sort-select" class="select">
            <option value="">Newest First</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
          </select>
        </div>
        <div class="product-grid" id="products-list"></div>
      </div>
    </main>
    <div id="app-footer"></div>
    <script src="js/app.js"></script>
  </body>
</html>
