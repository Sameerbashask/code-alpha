<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart | Checkout</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div id="app-header"></div>
    <main class="section">
      <div class="container">
        <h1 class="section-title">Checkout</h1>
        <p class="section-subtitle">Enter delivery details and place your Cash on Delivery order.</p>
        <div id="checkout-message"></div>
        <div class="checkout-grid">
          <div class="form-card">
            <h2>Delivery Information</h2>
            <form id="checkout-form" class="checkout-form">
              <div class="form-grid">
                <input class="input" type="text" name="fullName" placeholder="Customer name" required>
                <input class="input" type="text" name="phone" placeholder="Phone number" required>
                <input class="input full" type="text" name="address" placeholder="Delivery address" required>
                <input class="input" type="text" name="city" placeholder="City" required>
                <input class="input" type="text" name="state" placeholder="State" required>
                <input class="input full" type="text" name="postalCode" placeholder="Postal code" required>
              </div>
              <button class="btn btn-primary" type="submit">Place Order</button>
            </form>
          </div>
          <div id="checkout-summary"></div>
        </div>
      </div>
    </main>
    <div id="app-footer"></div>
    <script src="js/app.js"></script>
  </body>
</html>
